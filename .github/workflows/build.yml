name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

# Prevent concurrent builds on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Test suite — runs on every push and PR
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs tags to resolve version

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with flake8
        run: flake8 aom/ tests/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Linux build — produces: dist/aom
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux)
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs tags to resolve version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python3 -m pip install --upgrade pyinstaller setuptools-scm

      - name: Build executable
        run: bash build.sh

      - name: Smoke test
        run: |
          ./dist/aom --help
          echo "Exit code: $?"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aom-linux
          path: dist/aom
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows build — produces: dist\aom.exe
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    needs: [test]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs tags to resolve version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pyinstaller setuptools-scm

      - name: Build executable
        run: .\build.ps1

      - name: Smoke test
        run: |
          .\dist\aom.exe --help
          Write-Host "Exit code: $LASTEXITCODE"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aom-windows
          path: dist\aom.exe
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # GitHub Release — runs only when a version tag (v*) is pushed
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create/update releases

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: aom-linux
          path: release-artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: aom-windows
          path: release-artifacts/

      - name: Rename artifacts for release
        run: |
          mv release-artifacts/aom  release-artifacts/aom-linux-amd64
          mv release-artifacts/aom.exe  release-artifacts/aom-windows-amd64.exe
          chmod +x release-artifacts/aom-linux-amd64

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          sha256sum aom-linux-amd64          > checksums.txt
          sha256sum aom-windows-amd64.exe   >> checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ai-operation-manager ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → prerelease
          files: |
            release-artifacts/aom-linux-amd64
            release-artifacts/aom-windows-amd64.exe
            release-artifacts/checksums.txt
